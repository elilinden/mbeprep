services:
  postgres:
    image: postgres:16-alpine
    container_name: mbeprep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mbeprep
      POSTGRES_PASSWORD: mbeprep
      POSTGRES_DB: mbeprep
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbeprep -d mbeprep"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
